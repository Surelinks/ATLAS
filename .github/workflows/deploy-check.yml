name: Atlas AI - Quick Deploy Check

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  # Quick validation that project can build and deploy
  validate:
    name: Validate Project
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Validate Python syntax
        run: |
          python -m py_compile backend/app/main.py
          python -m py_compile ui/app.py
          echo "✅ Python syntax is valid"
      
      - name: Check deployment files exist
        run: |
          test -f render.yaml && echo "✅ render.yaml exists" || echo "❌ render.yaml missing"
          test -f requirements.txt && echo "✅ requirements.txt exists" || echo "❌ requirements.txt missing"
          test -f RENDER_DEPLOYMENT.md && echo "✅ Deployment guide exists" || echo "❌ Deployment guide missing"
      
      - name: Verify API structure
        run: |
          cd backend
          python -c "from app.main import app; print('✅ FastAPI app loads successfully')"
      
      - name: Summary
        run: |
          echo "=================================="
          echo "✅ Project validation passed!"
          echo "=================================="
          echo "Ready to deploy to Render"
